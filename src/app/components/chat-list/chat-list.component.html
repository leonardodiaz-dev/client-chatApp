<div class="w-full h-full border-r bg-white flex flex-col">
  <div class="flex flex-row justify-between items-center p-4">
    <h3 class="font-semibold text-lg">Chats</h3>
    <div class="flex justify-center items-start gap-5">
      <button class="btn-grande" (click)="changeView.emit('newChat')">
        <mat-icon>add_box</mat-icon>
      </button>
      <button class="btn-grande" [matMenuTriggerFor]="menu" #menuTrigger>
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="logout()">Cerrar Sesión</button>
      </mat-menu>
    </div>
  </div>
  <div class="flex flex-row gap-3 px-5 my-2">
    <button [ngClass]="filtro === 'todos' ? 'bg-blue-600' : 'bg-blue-300'" class="px-3 py-1.5 text-white rounded-lg"
      (click)="setFiltro('todos')">
      Todos
    </button>

    <button [ngClass]="filtro === 'no leidos' ? 'bg-blue-600' : 'bg-blue-300'" class="px-3 py-1.5 text-white rounded-lg"
      (click)="setFiltro('no leidos')">
      No Leidos
    </button>
  </div>
  <div class="overflow-y-auto flex-1">
    <div *ngIf="!loading">
      @for (chat of chats; track chat.id) {
      <div class="p-4 hover:bg-gray-100 cursor-pointer border-b" (click)="selectChat(chat)">
        <div class="flex justify-between">
          <span class="font-medium">{{ chat | chatName}}</span>
          <span class="text-xs text-gray-500">{{chat.last_date | formatearFecha}}</span>
        </div>

        <div class="flex flex-row justify-between items-center text-sm text-gray-500">
          <span> {{chat.last_message}}</span>
          <span *ngIf="chat.messages_count"
            class="flex items-center justify-center bg-blue-500 text-white size-7 rounded-full text-xs font-bold">
            {{ chat.messages_count }}
          </span>
        </div>
      </div>
      }
    </div>
    <div class="flex justify-center items-center h-full" *ngIf="loading">Cargando...</div>
    <div class="flex justify-center items-center h-full" *ngIf="chats.length === 0">No se encontraron chats</div>
  </div>
</div>
