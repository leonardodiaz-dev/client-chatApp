 <div class="flex flex-col flex-1 min-h-screen">

    <!-- header -->
    <div class="p-4 border-b bg-white font-semibold">
      {{conversation?.name || 'Selecciona un chat'}}
    </div>

    <!-- mensajes -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">

      @for (message of messages; track message.id) {

        <!-- mensaje propio -->
        @if (message.mine) {
          <div class="flex justify-end">
            <div class="bg-green-500 text-white px-4 py-2 rounded-lg max-w-xs">
              {{message.content}}
              <div class="text-xs text-right opacity-70">
                {{message.time}}
              </div>
            </div>
          </div>
        }

        <!-- mensaje recibido -->
        @else {
          <div class="flex justify-start">
            <div class="bg-white px-4 py-2 rounded-lg shadow max-w-xs">
              {{message.content}}
              <div class="text-xs text-gray-400">
                {{message.time}}
              </div>
            </div>
          </div>
        }

      }

    </div>

    <!-- input -->
    <div class="p-4 border-t bg-white flex gap-2">

      <input
        type="text"
        class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"
        placeholder="Escribe un mensaje..."
        [(ngModel)]="newMessage"
        (keydown.enter)="sendMessage()"
      >

      <button
        class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600"
        (click)="sendMessage()"
      >
        Enviar
      </button>

    </div>

  </div>
