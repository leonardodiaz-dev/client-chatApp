<h2 mat-dialog-title>Crear Nuevo Grupo</h2>
<mat-dialog-content>
    <div class="flex items-center gap-4 mb-6 p-2 bg-gray-50 rounded-lg">
        <div class="relative group">
            <div (click)="fileInput.click()" 
                 class="w-16 h-16 rounded-full bg-blue-200 flex items-center justify-center cursor-pointer overflow-hidden border-2 border-white shadow-sm hover:opacity-80 transition-all">
                @if (imagePreview()) {
                    <img [src]="imagePreview()" class="w-full h-full object-cover">
                } @else {
                    <span class="text-blue-600 text-xs text-center font-bold">SUBIR FOTO</span>
                }
            </div>
            <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">
        </div>

        <div class="flex-1">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Nombre del Grupo</label>
            <input type="text" [(ngModel)]="groupName" placeholder="Nombre del grupo..."
                class="w-full py-1 border-b-2 border-gray-300 focus:border-blue-500 focus:outline-none bg-transparent transition-colors text-lg" />
        </div>
    </div>

    <div class="mb-4">
        <input type="text" placeholder="Buscar contacto..."
            class="w-full p-2 border rounded-full text-sm focus:ring-2 focus:ring-blue-400 outline-none" 
            [ngModel]="search()" 
            (ngModelChange)="search.set($event)" />
    </div>

    <div class="flex flex-col gap-1 max-h-52 overflow-y-auto pr-2">
        @for (contact of filteredContacts(); track contact.id) {
            <div (click)="toggleMember(contact)"
                 [class.bg-blue-50]="isMember(contact)"
                 class="flex items-center justify-between hover:bg-gray-100 cursor-pointer rounded-md p-3 transition-all">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-xs text-white">
                        {{ contact.name[0] }}{{ contact.lastname[0] }}
                    </div>
                    <p class="text-sm font-medium text-gray-700">{{contact.name}} {{contact.lastname}}</p>
                </div>
                <input type="checkbox" [checked]="isMember(contact)" class="rounded text-blue-600">
            </div>
        }
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancelar</button>
    <button mat-raised-button color="primary" (click)="addGroup()" [disabled]="!groupName || selectedMembers().length === 0">
        Crear Grupo
    </button>
</mat-dialog-actions>
