@if (showProfileModal) {
<div class="fixed inset-0 z-50 flex">

  <div class="w-1/3 h-full bg-white shadow-xl flex flex-col p-6 gap-4 z-10">
    <div class="flex justify-between items-center border-b pb-3">
      <p class="font-semibold text-lg">Editar perfil</p>
      <button (click)="closeProfileModal()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="flex flex-col items-center gap-4 mt-2">
      <div class="relative group">
        <div
          class="w-28 h-28 rounded-full overflow-hidden shadow-md border-4 border-white ring-1 ring-gray-200 bg-gray-100 flex items-center justify-center">

          @if (avatarPreview) {
          <img [src]="avatarPreview" class="w-full h-full object-cover" alt="Vista previa del avatar">
          } @else {
          <mat-icon class="text-gray-400" style="font-size: 56px; width: 56px; height: 56px;">
            account_circle
          </mat-icon>
          }
        </div>

        <label for="avatarInput"
          class="absolute bottom-0 right-0 bg-blue-600 text-white p-1.5 rounded-full cursor-pointer shadow-lg hover:bg-blue-700 transition-transform hover:scale-110 border-2 border-white">
          <mat-icon style="font-size: 18px; width: 18px; height: 18px;">edit</mat-icon>
        </label>
      </div>

      <label for="avatarInput"
        class="cursor-pointer inline-flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-full text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all shadow-sm">
        <mat-icon style="font-size: 18px; width: 18px; height: 18px;">photo_camera</mat-icon>
        Cambiar foto
      </label>

      <input id="avatarInput" type="file" (change)="onAvatarChange($event)" class="hidden" accept="image/*">
    </div>

    <div class="flex flex-col gap-1 mt-4">
      <label class="text-sm text-gray-500">Nombre</label>
      <input type="text" [(ngModel)]="editName" class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400">
    </div>

    <div class="flex gap-2 mt-auto">
      <button class="flex-1 bg-gray-200 py-2 rounded-lg" (click)="closeProfileModal()">
        Cancelar
      </button>
      <button class="flex-1 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600" (click)="saveProfile()">
        Guardar
      </button>
    </div>
  </div>

  <div class="flex-1 bg-black/30" (click)="closeProfileModal()">
  </div>

</div>
}
